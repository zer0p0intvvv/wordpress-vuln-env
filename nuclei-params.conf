# nuclei-params.conf
# 每个漏洞跑 nuclei 时的额外参数。scan.sh 会读取本文件。
#
# 格式：  CVE-ID   token [token ...]
#   - 空行、# 开头的行忽略
#   - 同一 CVE 只取第一条匹配
#
# 可用 token：
#   auth          → 追加  -V username=admin -V password=admin
#   oob           → 标记为 OOB（interactsh 回连），脚本跳过自动判定，记 SKIP 待人工 curl 验证
#   skip          → 直接跳过该 CVE
#   其它任意 token → 原样透传给 nuclei（可写自定义变量或标志），例如：
#                      CVE-XXXX-XXXX  auth -V wp-version=6.4
#                      CVE-XXXX-XXXX  -V token=abc123
#
# 未在本文件出现的 CVE 按「无额外参数、直接跑」处理。

